name: Docs Preview
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id
    }}
  cancel-in-progress: true
'on':
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
    paths:
    - docs/**
    - tools/github_readme_sync/**
    - .github/workflows/docs_preview.yml
    - benchmarks/**
permissions:
  pull-requests: write
jobs:
  deploy_docs_preview:
    name: deploy-docs-preview
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'playground-nils' }}
    steps:
    - name: Checkout tbp.monty
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true
        path: tbp.monty
    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        lfs: true
        path: pr_docs
    - name: Create initial PR comment
      uses: ./tbp.monty/.github/actions/pin_comment
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.pull_request.number }}
        comment_id: docs-preview
        working_directory: tbp.monty
        message: "\U0001F4DA **Documentation Preview**\n\nBuilding documentation preview...\
          \ \u23F3\n\nCheck the [workflow logs](${{ github.server_url }}/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}) for progress.\n"
    - name: Set up ~/tbp
      run: 'mkdir -p ~/tbp

        ln -s $GITHUB_WORKSPACE/tbp.monty ~/tbp/tbp.monty

        '
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    - name: Install miniconda
      run: "if [ ! -d ~/miniconda ]\nthen\n  wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh\
        \ -O ~/miniconda.sh\n  bash ~/miniconda.sh -b -p ~/miniconda\n  rm ~/miniconda.sh\n\
        fi\nexport PATH=\"$HOME/miniconda/bin:$PATH\"\nconda --version\n"
    - name: Create conda environment
      working-directory: tbp.monty
      run: 'export PATH="$HOME/miniconda/bin:$PATH"

        (conda env list | grep tbp.monty) && conda remove --name tbp.monty --all --yes
        || true

        conda env create

        source activate tbp.monty

        pip install -e .[dev,github_readme_sync_tool,print_version_tool]

        '
    - name: Get version and branch
      id: preview_info
      uses: ./tbp.monty/.github/actions/get_preview_info
      with:
        user_login: ${{ github.event.pull_request.user.login }}
    - name: Deploy docs
      working-directory: tbp.monty
      run: 'export PATH="$HOME/miniconda/bin:$PATH"

        source activate tbp.monty

        export README_API_KEY=${{ secrets.README_API_KEY }}

        export IMAGE_PATH="${{ steps.preview_info.outputs.image_path }}"

        python -m tools.github_readme_sync.cli upload ../pr_docs/docs "${{ steps.preview_info.outputs.monty_version
        }}-${{ steps.preview_info.outputs.branch_name }}"

        '
    - name: Update PR comment on success
      if: success()
      uses: ./tbp.monty/.github/actions/pin_comment
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.pull_request.number }}
        comment_id: docs-preview
        working_directory: tbp.monty
        message: "\U0001F4DA **Documentation Preview**\n\n\u2705 A preview of the\
          \ documentation changes in this PR is available for maintainers at:\n${{\
          \ vars.DOCS_URL_PREFIX }}v${{ steps.preview_info.outputs.monty_version }}-${{\
          \ steps.preview_info.outputs.branch_name }}\n\nLast updated: ${{ steps.preview_info.outputs.monty_date\
          \ }}\n"
    - name: Update PR comment on failure
      if: failure()
      uses: ./tbp.monty/.github/actions/pin_comment
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        issue_number: ${{ github.event.pull_request.number }}
        comment_id: docs-preview
        working_directory: tbp.monty
        message: "\U0001F4DA **Documentation Preview**\n\n\u274C Failed to build documentation\
          \ preview.\n\nCheck the [workflow logs](${{ github.server_url }}/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}) for details.\n"
